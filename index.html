<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Battle X</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.7);
    }

    nav button {
      background: transparent;
      border: 2px solid cyan;
      color: cyan;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: cyan;
      text-shadow: 0 0 15px cyan;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
    }

    .descargar { background: cyan; color: black; }
    .donar { background: magenta; color: white; }

    .btn:hover { transform: scale(1.1); }
  </style>
</head>

<body>

  <!-- MENÚ -->
  <nav>
    <button onclick="ir('inicio')">Inicio</button>
    <button onclick="ir('descargas')">Descargar</button>
    <button onclick="ir('donaciones')">Donar</button>
  </nav>

  <!-- INICIO -->
  <section id="inicio">
    <h1>🚀 SPACE BATTLE X</h1>
    <p>Juego espacial épico hecho por ti 😎</p>

    <button class="btn descargar" onclick="ir('descargas')">
      📥 DESCARGAR
    </button>
  </section>

  <!-- DESCARGA -->
  <section id="descargas">
    <h1>📥 DESCARGA</h1>
    <p>Descarga el juego aquí 👇</p>

    <!-- 🔥 DESCARGA REAL -->
    <a href="JUEGO.zip" download="JUEGO.zip" class="btn descargar">
      🚀 DESCARGAR JUEGO ZIP
    </a>
  </section>

  <!-- DONACIONES -->
  <section id="donaciones">
    <h1>💖 DONACIONES</h1>
    <p>Apoya el proyecto 🚀</p>

    <a href="https://www.paypal.com/" target="_blank" class="btn donar">
      💸 DONAR
    </a>
  </section>

  <script>
    function ir(id) {
      document.getElementById(id).scrollIntoView({ behavior: "smooth" });
    }
  </script>

</body>
</html>
